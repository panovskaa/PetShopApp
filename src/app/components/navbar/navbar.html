<nav class="navbar" [class.scrolled]="isScrolled">
  <a routerLink="/" class="navbar-brand">
    <span class="brand-flower">🌸</span>
    <span class="brand-name">Kindred</span>
  </a>
  <div class="hamburger" [class.open]="menuOpen" (click)="toggleMenu()">
    <span></span><span></span><span></span>
  </div>
</nav>

<div class="menu-overlay" [class.open]="menuOpen" (click)="closeMenu()"></div>
<div class="slide-menu" [class.open]="menuOpen" (mouseleave)="closeMenu()">
  <a routerLink="/lost-pet" (click)="toggleMenu()" (touchstart)="onMenuLinkTouch($event)">Lost Pet</a>
  <a routerLink="/adopt" (click)="toggleMenu()" (touchstart)="onMenuLinkTouch($event)">Adopt</a>
  <a routerLink="/create-listing" (click)="toggleMenu()" (touchstart)="onMenuLinkTouch($event)">Create Listing</a>
  <p>Connecting pets with loving families across the community.</p>
</div>
